name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - run: uv run ruff check src/
      - run: uv run pytest

      # TypeScript
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v4

      - run: pip install python-semantic-release

      - name: Semantic Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if semantic-release version --no-vcs-release; then
            VERSION=$(semantic-release version --print)
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            git push
            git push --tags
            semantic-release publish
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      # Build and push Docker image in the same job — no checkout race
      - name: Docker login
        if: steps.release.outputs.released == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.release.outputs.released == 'true'
        uses: nick-fields/retry@v3
        env:
          IMAGE_TAG_LATEST: ghcr.io/${{ github.repository }}:latest
          IMAGE_TAG_VERSION: ghcr.io/${{ github.repository }}:${{ steps.release.outputs.version }}
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            docker buildx build \
              --push \
              --tag "$IMAGE_TAG_LATEST" \
              --tag "$IMAGE_TAG_VERSION" \
              .
