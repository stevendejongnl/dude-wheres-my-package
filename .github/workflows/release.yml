name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - run: uv run ruff check src/
      - run: uv run pytest

      # TypeScript
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  release:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v4

      - run: pip install python-semantic-release

      - name: Semantic Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if semantic-release version --no-vcs-release; then
            VERSION=$(semantic-release version --print)
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            git push
            git push --tags
            semantic-release publish
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      # Build and push Docker image in the same job — no checkout race
      - name: Docker login
        if: steps.release.outputs.released == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.release.outputs.released == 'true'
        uses: nick-fields/retry@v3
        env:
          IMAGE_TAG_LATEST: ghcr.io/${{ github.repository }}:latest
          IMAGE_TAG_VERSION: ghcr.io/${{ github.repository }}:${{ steps.release.outputs.version }}
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            docker buildx build \
              --push \
              --tag "$IMAGE_TAG_LATEST" \
              --tag "$IMAGE_TAG_VERSION" \
              .

  # Open a PR in the HA addon repo to bump its Dockerfile to the new dwmp image tag.
  # Runs only when semantic-release actually published a new version.
  # Requires repo secret ADDON_REPO_TOKEN (PAT or GitHub App token) with
  # contents:write + pull-requests:write on stevendejongnl/madebysteven-ha-addons.
  bump-addon:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout addon repo
        uses: actions/checkout@v4
        with:
          repository: stevendejongnl/madebysteven-ha-addons
          token: ${{ secrets.ADDON_REPO_TOKEN }}
          fetch-depth: 0

      - name: Open bump PR
        env:
          GH_TOKEN: ${{ secrets.ADDON_REPO_TOKEN }}
          NEW_VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail

          # Extract the pinned version from the addon's Dockerfile.
          OLD_VERSION=$(sed -nE 's|^FROM ghcr\.io/stevendejongnl/dude-wheres-my-package:(.+)$|\1|p' dwmp/Dockerfile)
          if [[ -z "$OLD_VERSION" ]]; then
            echo "Could not parse current dwmp version from dwmp/Dockerfile" >&2
            exit 1
          fi
          if [[ "$OLD_VERSION" == "$NEW_VERSION" ]]; then
            echo "Addon already pinned to v$NEW_VERSION — nothing to do."
            exit 0
          fi

          BRANCH="bump-dwmp-v${NEW_VERSION}"
          # Idempotency: skip if a bump branch for this version already exists upstream.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null; then
            echo "Branch $BRANCH already exists upstream — assuming PR is in flight."
            exit 0
          fi

          # Determine bump type from semver delta so the addon's own
          # semantic-release picks the matching bump.
          OLD_MAJOR="${OLD_VERSION%%.*}"
          NEW_MAJOR="${NEW_VERSION%%.*}"
          OLD_MINOR=$(echo "$OLD_VERSION" | cut -d. -f2)
          NEW_MINOR=$(echo "$NEW_VERSION" | cut -d. -f2)

          if [[ "$NEW_MAJOR" != "$OLD_MAJOR" ]]; then
            COMMIT_TYPE="feat"
            BREAKING_FOOTER="BREAKING CHANGE: dwmp upstream major bump (${OLD_VERSION} → ${NEW_VERSION})"
          elif [[ "$NEW_MINOR" != "$OLD_MINOR" ]]; then
            COMMIT_TYPE="feat"
            BREAKING_FOOTER=""
          else
            COMMIT_TYPE="fix"
            BREAKING_FOOTER=""
          fi

          # Update the FROM line.
          sed -i -E "s|(dude-wheres-my-package:)${OLD_VERSION}|\1${NEW_VERSION}|" dwmp/Dockerfile

          # Confirm the change actually landed.
          if ! grep -q "dude-wheres-my-package:${NEW_VERSION}" dwmp/Dockerfile; then
            echo "Failed to update dwmp/Dockerfile" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add dwmp/Dockerfile

          COMMIT_SUBJECT="${COMMIT_TYPE}(dwmp): bump upstream image to v${NEW_VERSION}"
          if [[ -n "$BREAKING_FOOTER" ]]; then
            git commit -m "$COMMIT_SUBJECT" -m "$BREAKING_FOOTER"
          else
            git commit -m "$COMMIT_SUBJECT"
          fi
          git push -u origin "$BRANCH"

          PR_BODY="Automated bump of dwmp from \`v${OLD_VERSION}\` to \`v${NEW_VERSION}\`.

          Release notes: https://github.com/stevendejongnl/dude-wheres-my-package/releases/tag/v${NEW_VERSION}"

          gh pr create \
            --repo stevendejongnl/madebysteven-ha-addons \
            --base main \
            --head "$BRANCH" \
            --title "$COMMIT_SUBJECT" \
            --body "$PR_BODY"

          # Personal repos can't add the Actions integration as a ruleset bypass
          # actor, so --auto + branch protection breaks the addon's own
          # semantic-release direct-push to main. Merge immediately instead;
          # validate.yml runs on the PR and post-merge as a regression net.
          gh pr merge "$BRANCH" \
            --repo stevendejongnl/madebysteven-ha-addons \
            --squash \
            --delete-branch
