{% extends "base.html" %}
{% block title %}Login — DWMP{% endblock %}
{% block content %}

<div style="max-width:360px;margin:80px auto;">
  <div class="card" style="padding:32px;">
    <h2 style="margin-bottom:8px;text-align:center;">Welcome back</h2>
    <p style="color:var(--text-dim);font-size:0.85rem;text-align:center;margin-bottom:24px;">Enter your password to continue</p>
    {% if error %}
    <div style="background:var(--red);color:white;padding:8px 12px;border-radius:8px;font-size:0.85rem;margin-bottom:16px;text-align:center;">
      {{ error }}
    </div>
    {% endif %}
    <form method="post" action="{{ base_path }}/login">
      <div style="margin-bottom:16px;">
        <input type="password" name="password" placeholder="Password" autofocus
          style="width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.95rem;outline:none;">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:10px;font-size:0.95rem;">
        Log in
      </button>
    </form>
  </div>
</div>

{% endblock %}
