<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DWMP">
  <meta name="theme-color" content="#0f1117">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
  <title>{% block title %}DWMP{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242736;
      --border: #2e3145;
      --text: #e1e4ed;
      --text-dim: #8b8fa3;
      --accent: #6c5ce7;
      --accent-hover: #7c6df7;
      --green: #00b894;
      --yellow: #fdcb6e;
      --orange: #e17055;
      --red: #d63031;
      --blue: #74b9ff;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 0 20px; }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      position: sticky; top: 0; z-index: 10;
    }
    header .container { display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; }
    .version-badge {
      font-size: 0.6rem; font-weight: 500; color: var(--accent);
      background: #6c5ce715; border: 1px solid #6c5ce730;
      padding: 2px 8px; border-radius: 20px; margin-left: 12px;
      letter-spacing: 0.3px;
    }
    nav { display: flex; gap: 8px; }
    nav a {
      color: var(--text-dim); text-decoration: none; padding: 6px 12px;
      border-radius: 8px; font-size: 0.875rem; transition: all 0.2s;
    }
    nav a:hover, nav a.active { color: var(--text); background: var(--surface2); }

    /* Main */
    main { padding: 24px 0; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
    }
    .stat-value { font-size: 2rem; font-weight: 700; }
    .stat-label { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

    /* Cards */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
    }
    .card-header {
      padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .card-header:hover { background: var(--surface2); }
    .card-body { padding: 0 20px 16px; }
    .card-body.collapsed { display: none; }

    /* Package */
    .pkg-main { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
    .pkg-carrier {
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      padding: 4px 8px; border-radius: 6px; white-space: nowrap;
    }
    .pkg-carrier.postnl { background: #ff6b0020; color: #ff8a50; }
    .pkg-carrier.dhl { background: #ffcc0020; color: #ffd93d; }
    .pkg-carrier.dpd { background: #dc143c20; color: #ff6b81; }
    .pkg-info { flex: 1; min-width: 0; }
    .pkg-tracking { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85rem; }
    .pkg-label { font-size: 0.8rem; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pkg-sender { font-weight: 400; color: var(--text-dim); font-size: 0.8rem; margin-left: 8px; }
    .pkg-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .pkg-date { font-size: 0.75rem; color: var(--text-dim); white-space: nowrap; }

    /* Status badges */
    .status {
      font-size: 0.75rem; font-weight: 600; padding: 4px 10px;
      border-radius: 20px; white-space: nowrap;
    }
    .status-delivered { background: #00b89420; color: var(--green); }
    .status-in_transit { background: #74b9ff20; color: var(--blue); }
    .status-out_for_delivery { background: #fdcb6e20; color: var(--yellow); }
    .status-pre_transit { background: #636e7220; color: var(--text-dim); }
    .status-failed_attempt { background: #e1705520; color: var(--orange); }
    .status-returned { background: #d6303120; color: var(--red); }
    .status-unknown { background: #636e7220; color: var(--text-dim); }

    /* Timeline */
    .timeline { padding: 12px 0 4px; }
    .timeline-event {
      display: flex; gap: 14px; padding: 10px 0;
      position: relative;
    }
    .timeline-event::before {
      content: ''; position: absolute; left: 5px; top: 30px; bottom: -10px;
      width: 2px; background: var(--border);
    }
    .timeline-event:last-child::before { display: none; }
    .timeline-dot {
      width: 12px; height: 12px; border-radius: 50%; margin-top: 5px; flex-shrink: 0;
      border: 2px solid var(--border); background: var(--surface);
    }
    .timeline-dot.active { border-color: var(--accent); background: var(--accent); box-shadow: 0 0 8px #6c5ce740; }
    .timeline-content { flex: 1; }
    .timeline-desc { font-size: 0.875rem; }
    .timeline-details { display: flex; gap: 12px; margin-top: 2px; }
    .timeline-time { font-size: 0.75rem; color: var(--text-dim); }
    .timeline-loc { font-size: 0.75rem; color: var(--text-dim); }

    /* Accounts */
    .account {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
    }
    .account:last-child { border-bottom: none; }
    .account-info { display: flex; align-items: center; gap: 12px; }
    .account-status { font-size: 0.75rem; }
    .account-status.connected { color: var(--green); }
    .account-status.auth_failed { color: var(--red); }
    .account-actions { display: flex; gap: 8px; }

    /* Buttons */
    .btn {
      padding: 6px 14px; border: none; border-radius: 8px; cursor: pointer;
      font-size: 0.8rem; font-weight: 500; transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--border); }
    .btn-danger:hover { background: #d6303120; }
    .btn-sm { padding: 4px 10px; font-size: 0.75rem; }

    /* Indicators */
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty state */
    .empty { text-align: center; padding: 48px 20px; color: var(--text-dim); }
    .empty p { margin-top: 8px; font-size: 0.9rem; }

    /* Notification bell & badge */
    .nav-bell { position: relative; display: inline-flex; align-items: center; }
    .nav-bell svg { width: 18px; height: 18px; fill: currentColor; }
    .notif-badge-dot {
      position: absolute; top: -4px; right: -8px;
      background: var(--red); color: white;
      font-size: 0.6rem; font-weight: 700;
      min-width: 16px; height: 16px; line-height: 16px;
      border-radius: 8px; text-align: center;
      padding: 0 4px; pointer-events: none;
    }

    /* Notification center page */
    .notification-card { transition: background 0.2s; }
    .notification-card.unread { background: var(--surface2); border-left: 3px solid var(--accent); }
    .notification-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; gap: 12px;
    }
    .notification-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
    .notification-info { display: flex; flex-direction: column; min-width: 0; }
    .notification-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .notification-transition { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
    .status-arrow { color: var(--text-dim); font-size: 0.8rem; }
    .notif-unread-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0;
    }
    .notif-page-count {
      font-size: 0.8rem; font-weight: 500; color: var(--accent);
      background: #6c5ce715; padding: 2px 10px; border-radius: 20px;
      margin-left: 8px;
    }

    /* Section header */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-header h2 { font-size: 1.1rem; font-weight: 600; }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 20px 0;
      margin-top: 48px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-dim);
    }
    footer a { color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
    footer a:hover { color: var(--text); }

    /* Mobile */
    @media (max-width: 640px) {
      header .container { flex-direction: column; gap: 10px; }
      header h1 { font-size: 1rem; }
      header h1 .app-title { display: none; }
      header h1 .app-title-short { display: inline; }
      .version-badge { margin-left: 8px; }
      nav { width: 100%; justify-content: center; }
      .stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat { padding: 12px; }
      .stat-value { font-size: 1.5rem; }
      .pkg-main { gap: 10px; }
      .pkg-tracking { font-size: 0.75rem; word-break: break-all; }
      .pkg-sender { display: block; margin-left: 0; margin-top: 2px; }
      .pkg-meta { align-items: flex-end; min-width: 90px; }
      .pkg-date { font-size: 0.7rem; }
      .card-header { padding: 12px 14px; }
      .card-body { padding: 0 14px 12px; }
      .account { flex-direction: column; gap: 10px; align-items: flex-start; }
      .account-actions { align-self: flex-end; }
      .notification-row { flex-direction: column; align-items: flex-start; }
      .notification-right { align-items: flex-start; width: 100%; }
      .notification-transition { justify-content: flex-start; }
    }
    @media (min-width: 641px) {
      .app-title-short { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>
        <img src="/static/icon-64.png" alt="" style="width:48px;height:48px;vertical-align:middle;margin-right:12px;border-radius:10px;">
        <span class="app-title">Dude, Where's My Package?</span>
        <span class="app-title-short">DWMP</span>
        <span class="version-badge">v{{ version }}</span>
      </h1>
      {% if active_nav %}
      <nav>
        <a href="/" class="{% if active_nav == 'packages' %}active{% endif %}">Packages</a>
        <a href="/accounts" class="{% if active_nav == 'accounts' %}active{% endif %}">Accounts</a>
        <a href="/notifications" class="{% if active_nav == 'notifications' %}active{% endif %} nav-bell">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C10.9 2 10 2.9 10 4C10 4.1 10 4.19 10.02 4.28C7.58 5.07 6 7.36 6 10V16L4 18V19H20V18L18 16V10C18 7.36 16.42 5.07 13.98 4.28C14 4.19 14 4.1 14 4C14 2.9 13.1 2 12 2ZM12 22C13.1 22 14 21.1 14 20H10C10 21.1 10.9 22 12 22Z"/></svg>
          <span id="notif-badge" hx-get="/notifications/badge" hx-trigger="load, every 30s" hx-swap="innerHTML"></span>
        </a>
        <a href="/docs" target="_blank">API</a>
      </nav>
      {% endif %}
    </div>
  </header>
  <main>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>
  <footer>
    <div class="container">
      <a href="https://github.com/stevendejongnl/dude-wheres-my-package" target="_blank">Dude, Where's My Package?</a>
      &middot;
      <a href="https://www.madebysteven.nl" target="_blank">MadeBySteven</a>
    </div>
  </footer>
  {% if active_nav %}
  <script src="/static/js/notifications.js"></script>
  {% endif %}
</body>
</html>
