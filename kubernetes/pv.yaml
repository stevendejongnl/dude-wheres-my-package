apiVersion: v1
kind: PersistentVolume
metadata:
  name: dwmp-data-pv
spec:
  capacity:
    storage: 100Mi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /var/lib/dwmp
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - worker-02
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dwmp-data-pvc
  namespace: package-tracking
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
  volumeName: dwmp-data-pv
