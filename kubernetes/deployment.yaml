apiVersion: apps/v1
kind: Deployment
metadata:
  name: dwmp
  namespace: package-tracking
  labels:
    app: dwmp
  annotations:
    keel.sh/policy: major
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 5m"
    keel.sh/match-tag: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dwmp
  template:
    metadata:
      labels:
        app: dwmp
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      nodeSelector:
        kubernetes.io/hostname: worker-02
      containers:
        - name: dwmp
          # Kept in sync by semantic-release (see pyproject.toml build_command).
          # Do NOT edit by hand — keel.sh rolls the live image forward on new
          # tags, and a manual downgrade here would be undone on the next apply.
          image: ghcr.io/stevendejongnl/dude-wheres-my-package:1.39.0
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: dwmp-config
            - secretRef:
                name: dwmp-auth
          volumeMounts:
            - name: data
              mountPath: /app/data
          env:
            - name: DB_PATH
              value: /app/data/dwmp.db
          resources:
            # Headless Chrome (Playwright) for Amazon + DPD sync needs
            # real memory and CPU during browser launch. The old
            # 256Mi / 250m limits caused the pod to be OOM-killed and
            # liveness-failed mid-Amazon-login, surfacing as 504s at
            # the ingress. 1Gi / 1 core leaves headroom for the
            # normal idle footprint (~120Mi) with spikes during sync.
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 30
            # A browser launch can stall the event loop for a few
            # seconds on a cold start — don't let one slow /health
            # reply kill the pod mid-sync.
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dwmp-data-pvc
